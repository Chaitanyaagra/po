async function generateBrandedPDF(){
  if(typeof window.jspdf==='undefined'){
    showToast('PDF engine unavailable — using browser print instead');
    printConsolidated();
    return;
  }
  const btn = document.getElementById('pdfBtn');
  if(btn) btn.disabled = true;
  try{
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({unit:'pt', format:'a4'});
    const pageW = doc.internal.pageSize.getWidth();
    const pageH = doc.internal.pageSize.getHeight();
    const margin = 40;
    const reportNo = await nextReportNumber();
    const qr = await generateQRDataUrl('MaxHeightsMajestic|'+reportNo+'|'+new Date().toISOString());

    function header(){
      doc.setFillColor(19,42,99);
      doc.rect(0,0,pageW,64,'F');
      try{ doc.addImage(LOGO_96, 'PNG', margin, 10, 44, 44); }catch(e){}
      doc.setTextColor(255,255,255);
      doc.setFontSize(14); doc.setFont(undefined,'bold');
      doc.text('Max Heights Majestic', margin+56, 30);
      doc.setFontSize(9.5); doc.setFont(undefined,'normal');
      doc.text('Resident Welfare Society — Inspection Report', margin+56, 44);
      if(qr) doc.addImage(qr, 'PNG', pageW-margin-44, 10, 44, 44);
      doc.setTextColor(20,27,46);
    }
    function footer(pageNum, totalPages){
      doc.setFontSize(8.5); doc.setTextColor(120,128,150);
      doc.text('Report '+reportNo, margin, pageH-20);
      doc.text('Page '+pageNum+' of '+totalPages, pageW-margin-70, pageH-20);
      doc.setTextColor(20,27,46);
    }

    let y = 90;
    header();
    doc.setFontSize(11); doc.setFont(undefined,'bold');
    doc.text('Report No: '+reportNo, margin, y); y+=14;
    doc.setFont(undefined,'normal'); doc.setFontSize(9.5);
    doc.text('Generated: '+fmtDateTime(new Date().toISOString())+'   ·   Total Inspections: '+DB.inspections.length+'   ·   Open Defects: '+DB.defects.filter(x=>x.status!=='closed').length, margin, y); y+=22;

    doc.setFont(undefined,'bold'); doc.setFontSize(12);
    doc.text('Inspection Submissions', margin, y); y+=16;
    doc.setFont(undefined,'normal'); doc.setFontSize(9);
    let pageNum = 1;
    const rowsA = DB.inspections.slice(0,200);
    for(const r of rowsA){
      const s = collectDraftStats(r);
      const line = fmtDate(r.date)+'  ·  '+SECTION_DEFS[r.formType].label+'  ·  Tower '+r.tower+'  ·  '+(r.supervisorName||'—')+'  ·  '+s.ok+' OK / '+s.notOk+' issues';
      if(y > pageH-70){ footer(pageNum, '~'); doc.addPage(); pageNum++; header(); y=90; }
      doc.text(line, margin, y); y+=13;
    }
    y+=10;
    if(y > pageH-120){ footer(pageNum,'~'); doc.addPage(); pageNum++; header(); y=90; }
    doc.setFont(undefined,'bold'); doc.setFontSize(12);
    doc.text('Open Defects', margin, y); y+=16;
    doc.setFont(undefined,'normal'); doc.setFontSize(9);
    const rowsB = DB.defects.filter(x=>x.status!=='closed');
    if(!rowsB.length){ doc.text('No open defects at time of report.', margin, y); y+=13; }
    for(const x of rowsB){
      const tag = isBreach(x) ? ' [CRITICAL BREACH]' : (isOverdue(x) ? ' [OVERDUE]' : '');
      const lines = doc.splitTextToSize('['+x.priority.toUpperCase()+'] Tower '+x.tower+' — '+x.location+' — '+(x.observation||'')+tag, pageW-margin*2);
      if(y > pageH-70){ footer(pageNum,'~'); doc.addPage(); pageNum++; header(); y=90; }
      doc.text(lines, margin, y); y += lines.length*12 + 4;
    }
    const total = doc.internal.getNumberOfPages();
    for(let p=1;p<=total;p++){ doc.setPage(p); doc.setFontSize(8.5); doc.setTextColor(120,128,150); doc.text('Report '+reportNo, margin, pageH-20); doc.text('Page '+p+' of '+total, pageW-margin-70, pageH-20); }

    doc.save(reportNo+'.pdf');
    await logAudit('report_generated', 'PDF report '+reportNo);
    showToast('PDF downloaded');
  }catch(e){
    console.error(e);
    showToast('PDF generation failed — using print fallback');
    printConsolidated();
  }
  if(btn) btn.disabled = false;
}

function printConsolidated(){
  const area = document.getElementById('printArea');
  const overdue = DB.defects.filter(isOverdue);
  area.innerHTML = '<h2>Max Heights Majestic — Consolidated Inspection Report</h2>'
    + '<p style="font-size:12px; color:#555;">Generated '+fmtDateTime(new Date().toISOString())+'</p><hr>'
    + '<h3>Submissions ('+DB.inspections.length+')</h3>'
    + DB.inspections.map(r=>{ const stats = recordStats(r); return '<p style="font-size:12px; margin:4px 0;">'+fmtDate(r.date)+' — '+SECTION_DEFS[r.formType].label+' — Tower '+r.tower+' — '+esc(r.supervisorName)+' — '+stats.ok+' OK / '+stats.notOk+' issues</p>'; }).join('')
    + '<hr><h3>Open Defects ('+DB.defects.filter(x=>x.status!=='closed').length+') — '+overdue.length+' overdue</h3>'
    + DB.defects.filter(x=>x.status!=='closed').map(x=>'<p style="font-size:12px; margin:4px 0;">['+x.priority.toUpperCase()+'] Tower '+x.tower+' — '+esc(x.location)+' — '+esc(x.observation)+' — '+x.status+(isOverdue(x)?' — OVERDUE':'')+'</p>').join('');
  area.style.display='block';
  setTimeout(()=>{ window.print(); area.style.display='none'; }, 50);
}
function exportDefectsCsv(){
  const rows = [['ID','Tower','Form','Location','Observation','Priority','Status','Assigned To','Target Date','Created At','Overdue']];
  DB.defects.forEach(x=> rows.push([x.id, x.tower, SECTION_DEFS[x.formType].label, x.location, x.observation, x.priority, x.status, x.assignedTo, x.targetDate, x.createdAt, isOverdue(x)?'YES':'NO']));
  const csv = rows.map(r=> r.map(c=>'"'+String(c||'').replace(/"/g,'""')+'"').join(',')).join('\\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'defect-log-'+todayStr()+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('CSV downloaded');
}
function exportExcel(){
  if(typeof XLSX==='undefined'){ showToast('Excel engine unavailable — downloading CSV instead'); exportDefectsCsv(); return; }
  try{
    const wb = XLSX.utils.book_new();
    const insRows = DB.inspections.map(r=>{ const s=recordStats(r); return {Date:r.date, Type:SECTION_DEFS[r.formType].label, Tower:r.tower, Supervisor:r.supervisorName, OK:s.ok, Issues:s.notOk, SubmittedAt:r.submittedAt}; });
    const defRows = DB.defects.map(x=>({Tower:x.tower, Location:x.location, Observation:x.observation, Priority:x.priority, Status:x.status, AssignedTo:x.assignedTo, TargetDate:x.targetDate, CreatedAt:x.createdAt, Overdue:isOverdue(x)?'YES':'NO'}));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(insRows), 'Inspections');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(defRows), 'Defects');
    XLSX.writeFile(wb, 'max-heights-inspections-'+todayStr()+'.xlsx');
    showToast('Excel file downloaded');
  }catch(e){ console.error(e); showToast('Excel export failed — downloading CSV instead'); exportDefectsCsv(); }
}

    + '<div class="stack">'
    + '<div class="card"><span class="section-label">Appearance</span>'
    + '<div class="settings-row"><div class="settings-row-text"><b>Dark mode</b><span>Easier on the eyes in low light</span></div><label class="switch"><input type="checkbox" '+(state.theme==='dark'?'checked':'')+' onchange="toggleTheme()"><span class="switch-track"></span></label></div>'
    + '</div>'
    + '<div class="card"><span class="section-label">'+icon('lock',13)+' Admin Access</span>'
    + '<div class="settings-row"><div class="settings-row-text"><b>Status</b><span>'+(state.adminUnlocked?'Unlocked on this device':'Locked')+'</span></div>'+(state.adminUnlocked? '<button class="btn btn-sm btn-ghost" onclick="lockAdmin()">Lock now</button>' : '<button class="btn btn-sm btn-ghost" onclick="requestAdminSwitch()">Unlock</button>')+'</div>'
    + (state.adminUnlocked? '<div class="settings-row"><div class="settings-row-text"><b>Change PIN</b><span>Applies to all devices — this is a shared convenience lock</span></div><button class="btn btn-sm btn-ghost" onclick="state.pinPurpose=\'change\'; state.showPinModal=true; render();">Change</button></div>' : '')

    + '</div>'
    + '<div class="card"><span class="section-label">'+icon('bell',13)+' Notifications</span>'
    + '<div class="settings-row"><div class="settings-row-text"><b>In-app alerts</b><span>Bell icon shows overdue & breach defects</span></div><label class="switch"><input type="checkbox" checked disabled><span class="switch-track"></span></label></div>'
    + '<div class="settings-row"><div class="settings-row-text"><b>Push / WhatsApp / Email</b><span>Not connected — needs a backend + messaging provider</span></div><label class="switch"><input type="checkbox" disabled><span class="switch-track"></span></label></div>'
    + '<p class="chart-fallback-note">This app can only notify people while this page is open in a browser. Sending real push, WhatsApp, or email alerts requires a server with API keys for a provider (e.g. FCM, WhatsApp Business Cloud API, SendGrid) — that\'s a backend project, not something a browser file can do safely.</p>'
    + '</div>'
    + (state.role==='admin' ? '<div class="card"><span class="section-label">'+icon('clipboard',13)+' Audit Log</span>' + auditLogHtml() + '</div>' : '')
    + '<div class="card"><span class="section-label">Data</span>'
    + '<div class="btn-row"><button class="btn btn-ghost" onclick="exportBackup()">'+icon('download',15)+' Export backup (JSON)</button></div>'
    + (state.role==='admin' ? '<div class="btn-row" style="margin-top:8px;"><button class="btn btn-danger" onclick="confirmClearData()">'+icon('trash',15)+' Clear all data</button></div>' : '')
    + '</div>'
    + '<div class="card"><span class="section-label">'+icon('info',13)+' About & Limitations</span>'
    + '<p style="font-size:12.5px; line-height:1.6; color:var(--ink-soft);">This app stores data in browser-based key-value storage shared across everyone who opens this file — not a real database. There is no server, so: no enforced user roles/permissions (the PIN is a convenience lock only), no real push/WhatsApp/email sending, and no AI-based photo analysis (crack/rust/leak detection would need a trained vision model behind a real backend — this app intentionally does not fake that). Photo tagging, housekeeping scoring, and defect tracking here are honest, rule-based features — not AI.</p>'

function auditLogHtml(){
  const entries = DB.audit.slice(0,40);
  if(!entries.length) return '<p style="font-size:12.5px; color:var(--ink-faint);">No activity logged yet.</p>';
  return entries.map(e=> '<div class="item-row" style="flex-direction:column; align-items:stretch;"><div style="display:flex; justify-content:space-between;"><b style="font-size:12px;">'+e.action.replace(/_/g,' ')+'</b><span class="defect-meta">'+fmtDateTime(e.at)+'</span></div><span style="font-size:11.5px; color:var(--ink-soft);">'+esc(e.details||'')+'</span></div>').join('');
}
async function exportBackup(){
  const backup = {exportedAt:new Date().toISOString(), inspections:DB.inspections, defects:DB.defects, audit:DB.audit};
  const blob = new Blob([JSON.stringify(backup,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='max-heights-backup-'+todayStr()+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  await logAudit('backup_exported', 'Backup JSON downloaded');
  await loadAll();
  showToast('Backup downloaded');
}
function confirmClearData(){
  askConfirm({
    title:'Clear all data?',
    message:'This permanently deletes ALL inspections and defects for everyone using this app, on every device. This cannot be undone.',
    confirmLabel:'Delete everything',
    danger:true,
    onConfirm: doClearData
  });
}
async function doClearData(){
  for(const r of DB.inspections) await storeDelete('insp:'+r.id);
  for(const x of DB.defects) await storeDelete('defect:'+x.id);
  await logAudit('data_cleared', 'All inspections and defects were cleared');
  await loadAll();
  render();
  showToast('All data cleared');
}
</script>
